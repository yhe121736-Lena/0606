<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>午夜觀測站 414730191</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    body {
      margin: 0; padding: 0; background-color: #000; color: #fff;
      font-family: "Courier New", Courier, monospace;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
    }
    #canvas-container { border: 2px solid #333; box-shadow: 0 0 30px #000; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <script>
    // ==========================================
    // FNAF 模式：免訓練 AI 辨識系統 (恐怖升級版)
    // ==========================================

    let video;
    let handpose;
    let faceapi;
    let modelsLoaded = { hand: false, face: false };
    
    // 預測結果儲存
    let handPredictions = [];
    let facePredictions = [];

    // AI 變數
    let currentLabel = "None";
    let actionFeedbackTimer = 0; // AI 動作成功時的回饋計時器
    
    // 遊戲核心狀態
    let gameState = "START"; 
    let timeFrames = 0; 
    let power = 100.0;
    let powerUsage = 1; 
    let isMonitorUp = false;
    let currentCam = 1; 
    let monitorTransition = 0;

    let threats = {
      leftDoor: { progress: 0, speed: 0.15, isAttacking: false },
      rightDoor: { progress: 0, speed: 0.12, isAttacking: false },
      vent: { isBroken: false, timer: 0 },
      phantom: { isActive: false, timer: 0 },
      window: { isActive: false, timer: 0 },
      blackout: { isActive: false, timer: 0 }
    };

    let staticNoise = [];
    let jumpscareTimer = 0;
    let jumpscareType = "";

    function setup() {
      let canvas = createCanvas(800, 600);
      canvas.parent('canvas-container');
      
      video = createCapture(VIDEO);
      video.size(320, 240); // 提高解析度讓手部與臉部更好抓
      video.hide();

      // 載入 Handpose
      handpose = ml5.handpose(video, () => { modelsLoaded.hand = true; });
      handpose.on("predict", results => { handPredictions = results; });

      // 載入 FaceAPI
      const faceOptions = { withLandmarks: false, withDescriptors: false, withExpressions: true };
      faceapi = ml5.faceApi(video, faceOptions, () => { 
        modelsLoaded.face = true; 
        detectFace(); // 開始循環偵測
      });

      // 預先生成雜訊圖案
      for(let i=0; i<10; i++) {
        let pg = createGraphics(width, height);
        pg.loadPixels();
        for(let j=0; j<pg.pixels.length; j+=4) {
          let c = random(0, 50);
          pg.pixels[j] = c; pg.pixels[j+1] = c; pg.pixels[j+2] = c; pg.pixels[j+3] = 150;
        }
        pg.updatePixels();
        staticNoise.push(pg);
      }
    }

    function detectFace() {
      faceapi.detect(gotFaces);
    }

    function gotFaces(error, result) {
      if (error) return;
      facePredictions = result;
      detectFace(); // 繼續下一次偵測
    }

    // 核心辨識邏輯
    function analyzeAIInputs() {
      let newLabel = "None";

      // 1. 優先檢查手部姿勢
      if (handPredictions.length > 0) {
        let hand = handPredictions[0].landmarks;
        let thumbTip = hand[4], indexTip = hand[8], indexBase = hand[5];
        let midTip = hand[12], midBase = hand[9];
        let ringTip = hand[16], ringBase = hand[13];
        let pinkyTip = hand[20], pinkyBase = hand[17];

        let d = dist(thumbTip[0], thumbTip[1], indexTip[0], indexTip[1]);
        
        let indexFolded = indexTip[1] > indexBase[1];
        let midFolded = midTip[1] > midBase[1];
        let ringFolded = ringTip[1] > ringBase[1];
        let pinkyFolded = pinkyTip[1] > pinkyBase[1];
        let thumbUp = thumbTip[1] < indexBase[1];

        if (d < 40) {
          newLabel = "OK";
        } else if (midFolded && ringFolded && pinkyFolded && thumbUp && indexFolded) {
          newLabel = "Like";
        } else if (!indexFolded && !midFolded && !ringFolded && !pinkyFolded) {
          newLabel = "Wave";
        }
      }

      // 2. 如果手沒動作，檢查臉部表情
      if (newLabel === "None" && facePredictions.length > 0) {
        let expr = facePredictions[0].expressions;
        if (expr.happy > 0.6) newLabel = "Smile";
        else if (expr.surprised > 0.6) newLabel = "Surprise";
        else if (expr.angry > 0.5 || expr.sad > 0.5) newLabel = "Frown";
      }

      currentLabel = newLabel;
    }

    function draw() {
      background(0);

      // 確保模型都載入完畢才開始
      if (!modelsLoaded.hand || !modelsLoaded.face) {
        fill(255); textAlign(CENTER, CENTER); textSize(24);
        text("系統啟動中... 正在載入視覺神經網路 (可能需要幾秒鐘)", width/2, height/2);
        return;
      }

      analyzeAIInputs(); // 即時更新 AI 標籤

      if (gameState === "START") drawStartScreen();
      else if (gameState === "PLAYING") {
        updateGameLogic();
        if (isMonitorUp) drawCameras(); else drawOffice();
        
        if (monitorTransition > 0) {
          fill(200, monitorTransition * 25.5);
          rect(0, 0, width, height);
          monitorTransition -= 2;
        }

        drawUI();
        drawCRT();
        drawVignette(); // 加入畫面壓暗與閃爍特效
      } 
      else if (gameState === "JUMPSCARE") drawJumpscare();
      else if (gameState === "6AM") drawWinScreen();
    }

    function updateGameLogic() {
      timeFrames++;
      let hour = floor(timeFrames / 1200);
      if (hour >= 6) { gameState = "6AM"; return; }

      powerUsage = 1;
      if (isMonitorUp) powerUsage = 2;
      if (threats.vent.isBroken) powerUsage += 1;
      
      power -= (powerUsage * 0.015);
      if (power <= 0 && !threats.blackout.isActive) {
        power = 0; threats.blackout.isActive = true; threats.blackout.timer = 300; isMonitorUp = false;
      }

      if (!threats.blackout.isActive) {
        threats.leftDoor.progress += threats.leftDoor.speed;
        if (threats.leftDoor.progress > 100) triggerJumpscare("鐵鉤");

        threats.rightDoor.progress += threats.rightDoor.speed;
        if (threats.rightDoor.progress > 100) triggerJumpscare("巨口");

        if (!threats.vent.isBroken && random() < 0.002) threats.vent.isBroken = true;
        if (threats.vent.isBroken) threats.vent.timer++;
        if (threats.vent.timer > 600) triggerJumpscare("窒息"); 

        if (!isMonitorUp && !threats.phantom.isActive && random() < 0.003) {
          threats.phantom.isActive = true; threats.phantom.timer = 180; 
        }
        if (threats.phantom.isActive) {
          threats.phantom.timer--;
          if (threats.phantom.timer <= 0) triggerJumpscare("幻影");
        }

        if (!isMonitorUp && !threats.window.isActive && random() < 0.003) {
          threats.window.isActive = true; threats.window.timer = 180; 
        }
        if (threats.window.isActive) {
          threats.window.timer--;
          if (threats.window.timer <= 0) triggerJumpscare("窺視者");
        }
      } else {
        threats.blackout.timer--;
        if (threats.blackout.timer <= 0) triggerJumpscare("暗獸");
      }

      // 判定邏輯 (包含回饋)
      if (currentLabel !== "None") {
        let actionSuccess = false;

        if (threats.blackout.isActive && currentLabel === "Surprise") {
          threats.blackout.isActive = false; power = 15; actionSuccess = true;
        }
        
        if (!isMonitorUp) {
          if (threats.phantom.isActive && currentLabel === "Smile") { threats.phantom.isActive = false; actionSuccess = true; }
          if (threats.window.isActive && currentLabel === "Frown") { threats.window.isActive = false; actionSuccess = true; }
        } else {
          if (currentCam === 1 && currentLabel === "Wave" && threats.leftDoor.progress > 0) { threats.leftDoor.progress = 0; actionSuccess = true; }
          if (currentCam === 2 && currentLabel === "Like" && threats.rightDoor.progress > 0) { threats.rightDoor.progress = 0; actionSuccess = true; }
          if (currentCam === 3 && currentLabel === "OK" && threats.vent.isBroken) { threats.vent.isBroken = false; threats.vent.timer = 0; actionSuccess = true; }
        }

        // 如果成功解除威脅，設定綠光回饋
        if (actionSuccess) actionFeedbackTimer = 20;
      }
    }

    function triggerJumpscare(type) { gameState = "JUMPSCARE"; jumpscareType = type; jumpscareTimer = 60; }

    function drawOffice() {
      fill(20, 20, 25); rect(0, 0, width, height);
      fill(40, 30, 20); rect(100, height - 150, width - 200, 150);
      fill(10, 10, 15); stroke(50); strokeWeight(5); rect(width - 250, 100, 150, 200); noStroke();

      if (threats.blackout.isActive) {
        fill(0, 200); rect(0, 0, width, height);
        fill(255, 0, 0, random(100, 255));
        textAlign(CENTER, CENTER); textSize(24);
        text("系統離線。張開嘴巴表現驚訝 (Surprise) 重啟。", width/2, height/2);
        return;
      }

      if (threats.window.isActive) {
        fill(255, 0, 0); ellipse(width - 175 + random(-2,2), 200 + random(-2,2), 20, 20);
        ellipse(width - 125 + random(-2,2), 200 + random(-2,2), 20, 20);
        fill(255); textSize(12); textAlign(CENTER); text("皺眉 (Frown) 瞪回去", width - 150, 320);
      }

      if (threats.phantom.isActive) {
        let alpha = map(threats.phantom.timer, 180, 0, 0, 255);
        fill(200, 180, 0, alpha); ellipse(width/2, height/2, 150, 200);
        fill(0, alpha); ellipse(width/2 - 30, height/2 - 20, 30, 40); ellipse(width/2 + 30, height/2 - 20, 30, 40);
        fill(255); textSize(16); textAlign(CENTER); text("保持微笑 (Smile) 證明無敵意", width/2, height/2 + 130);
      }
    }

    function drawCameras() {
      image(staticNoise[frameCount % 10], 0, 0);
      fill(255); textAlign(CENTER, CENTER); textSize(24);
      text(`CAM 0${currentCam} : ${["左走廊", "右走廊", "機房/通風管"][currentCam - 1]}`, width/2, 50);

      push();
      translate(width/2, height/2);
      if (currentCam === 1) {
        fill(50); rect(-100, -150, 200, 300);
        let yPos = map(threats.leftDoor.progress, 0, 100, -50, 100);
        fill(200, 0, 0); ellipse(0, yPos, 60, 60);
        if (threats.leftDoor.progress > 70) { fill(255, 0, 0); textSize(16); text("危險！張開手掌揮手 (Wave) 關門", 0, 170); }
      } else if (currentCam === 2) {
        fill(50); rect(-100, -150, 200, 300);
        let size = map(threats.rightDoor.progress, 0, 100, 20, 150);
        fill(100, 0, 200); ellipse(0, 50, size, size);
        if (threats.rightDoor.progress > 70) { fill(255, 0, 0); textSize(16); text("危險！比讚 (Like) 電擊", 0, 170); }
      } else if (currentCam === 3) {
        fill(30); ellipse(0, 0, 250, 250);
        if (threats.vent.isBroken) {
          fill(255, 0, 0, random(100, 255)); text("氣壓流失！比出 OK 手勢修復", 0, 0);
        } else { fill(0, 255, 0); text("設備運作正常", 0, 0); }
      }
      pop();

      for(let i=0; i<3; i++) {
        let bx = width - 150; let by = 100 + i*60;
        fill(currentCam === i+1 ? color(200) : color(50)); stroke(255); strokeWeight(2); rect(bx, by, 100, 40);
        fill(currentCam === i+1 ? 0 : 255); noStroke(); textSize(16); text(`CAM 0${i+1}`, bx + 50, by + 20);
      }
    }

    function drawUI() {
      fill(255); textAlign(RIGHT, TOP); textSize(32);
      let hour = floor(timeFrames / 1200); text(`${hour === 0 ? 12 : hour} AM`, width - 20, 20);

      textAlign(LEFT, BOTTOM); textSize(20); fill(power > 20 ? 255 : color(255, 0, 0));
      text(`電力: ${floor(power)}%`, 20, height - 20); text(`消耗: ${"🔋".repeat(powerUsage)}`, 20, height - 50);

      fill(0, 255, 102); textSize(14);
      text(`即時神經網路辨識: [ ${currentLabel} ]`, 20, 30);

      if (!threats.blackout.isActive) {
        let btnColor = isMonitorUp ? color(200, 50, 50) : color(200);
        fill(btnColor); stroke(255); rect(width/2 - 100, height - 40, 200, 30);
        fill(0); noStroke(); textAlign(CENTER, CENTER); textSize(16);
        text(isMonitorUp ? "關閉監視器 (SPACE)" : "開啟監視器 (SPACE)", width/2, height - 25);
      }
      
      fill(255, 50); textAlign(RIGHT, BOTTOM); textSize(12); text("保安編號: 414730191", width - 10, height - 10);
      
      // 將視訊畫面縮小放到左上角
      image(video, 20, 50, 160, 120);
      noFill(); stroke(0, 255, 102); rect(20, 50, 160, 120);

      // AI 成功判定回饋特效
      if (actionFeedbackTimer > 0) {
        fill(0, 255, 0, actionFeedbackTimer * 10);
        rect(0, 0, width, height); // 全畫面閃爍綠光
        fill(0, 255, 0);
        textSize(32); textAlign(CENTER, CENTER);
        text("威脅已解除", width/2, height/2 - 100);
        actionFeedbackTimer--;
      }
    }

    function drawCRT() { 
      stroke(255, 255, 255, 15); strokeWeight(2); 
      for(let i=0; i<height; i+=4) line(0, i, width, i); 
    }

    // 幽閉恐懼與隨機閃爍特效
    function drawVignette() {
      let radius = isMonitorUp ? width * 0.8 : width * 1.2;
      for (let r = radius; r < width * 1.5; r += 20) {
        let alpha = map(r, radius, width * 1.5, 0, 200);
        noFill(); stroke(0, alpha); strokeWeight(20);
        ellipse(width / 2, height / 2, r, r * 0.75);
      }

      if (!isMonitorUp && !threats.blackout.isActive && random() < 0.05) {
        fill(0, random(50, 150));
        rect(0, 0, width, height);
      }
    }

    function drawStartScreen() {
      textAlign(CENTER, CENTER); fill(255); textSize(48); text("午夜觀測站 414730191", width/2, height/2 - 100);
      textSize(18); text("按 SPACE 切換監視器。\n系統已連線 Google FaceAPI 與 Handpose。\n活到 6 AM。", width/2, height/2);
      if (frameCount % 60 < 30) { fill(255, 0, 0); textSize(24); text("點擊畫面開始值班", width/2, height/2 + 100); }
    }

    // 更強烈的突發驚嚇特效
    function drawJumpscare() {
      let shakeX = random(-20, 20);
      let shakeY = random(-20, 20);
      
      push();
      translate(shakeX, shakeY);
      background(random(150, 255), 0, 0); 
      
      // 怪物本體
      fill(0); 
      ellipse(width/2, height/2 + 50, 500, 600);
      fill(255); 
      ellipse(width/2 - 100, height/2 - 50, random(40, 70), random(40, 70)); 
      ellipse(width/2 + 100, height/2 - 50, random(40, 70), random(40, 70));
      pop();

      // 雜訊干擾
      image(staticNoise[frameCount % 10], 0, 0);

      fill(255); textAlign(CENTER, CENTER); textSize(48); textStyle(BOLD);
      text(`GAME OVER`, width/2, height - 150);
      textStyle(NORMAL); textSize(24);
      text(`被 ${jumpscareType} 撕裂了`, width/2, height - 100);
      
      jumpscareTimer--;
      if (jumpscareTimer <= 0) { 
        fill(255); textSize(16); text("點擊畫面重新開始", width/2, height - 50); 
      }
    }

    function drawWinScreen() {
      background(0); fill(0, 255, 0); textAlign(CENTER, CENTER); textSize(64); text("6:00 AM", width/2, height/2 - 50);
      textSize(24); fill(255); text("你成功存活了下來。", width/2, height/2 + 50);
    }

    function mousePressed() {
      if (gameState === "START") gameState = "PLAYING";
      else if (gameState === "JUMPSCARE" && jumpscareTimer <= 0) resetGame();
      else if (gameState === "PLAYING" && isMonitorUp) {
        for(let i=0; i<3; i++) {
          let bx = width - 150; let by = 100 + i*60;
          if (mouseX > bx && mouseX < bx + 100 && mouseY > by && mouseY < by + 40) { currentCam = i + 1; monitorTransition = 10; }
        }
      }
    }

    function keyPressed() { if (key === ' ' && gameState === "PLAYING" && !threats.blackout.isActive) { isMonitorUp = !isMonitorUp; monitorTransition = 10; } }

    function resetGame() {
      gameState = "PLAYING"; timeFrames = 0; power = 100; isMonitorUp = false; currentCam = 1;
      threats = {
        leftDoor: { progress: 0, speed: 0.15, isAttacking: false }, rightDoor: { progress: 0, speed: 0.12, isAttacking: false },
        vent: { isBroken: false, timer: 0 }, phantom: { isActive: false, timer: 0 },
        window: { isActive: false, timer: 0 }, blackout: { isActive: false, timer: 0 }
      };
    }
  </script>
</body>
</html>
